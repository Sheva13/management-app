name: managementku
description: "FinansialKu - Aplikasi Manajemen Keuangan Pribadi"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # Database
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # State Management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # UI
  cupertino_icons: ^1.0.8
  fl_chart: ^0.68.0
  glassmorphism: ^3.0.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  share_plus: ^10.0.0
  file_picker: ^8.0.0

  # Backup
  workmanager: ^0.9.0+3
  permission_handler: ^12.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  drift_dev: ^2.14.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0

  # Linting
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
